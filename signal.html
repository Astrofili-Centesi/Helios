<!DOCTYPE html>
<html>
<head>
    <title>Signal Analysis</title>
    <!-- Include Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="processData.js"></script>
    <style>
        #plot {
            height: 75vh;
        }
        #backButton {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Signal Analysis</h1>
    <div>
        <label for="n_hours">Number of hours:</label>
        <input type="number" id="n_hours" value="24" step="1" min="1">

        <label for="smooth_window">Smoothing window (minutes):</label>
        <input type="number" id="smooth_window" value="15" step="1" min="1">

        <label for="prominence">Prominence:</label>
        <input type="number" id="prominence" value="1" step="0.1" min="0">

        <label for="correlation_threshold">Correlation Threshold:</label>
        <input type="number" id="correlation_threshold" value="0.9" step="0.01" min="0" max="1">

        <label for="correlation_window">Correlation Window (minutes):</label>
        <input type="number" id="correlation_window" value="15" step="1" min="1">

        <label for="min_channels">Minimum Channels:</label>
        <input type="number" id="min_channels" value="3" step="1" min="1">

        <br><br>

        <label for="enable_filter">High Pass Filter:</label>
        <input type="checkbox" id="enable_filter">

        <label for="short_window">Short Moving Average (minutes):</label>
        <input type="number" id="short_window" value="5" step="1" min="1">

        <label for="long_window">Long Moving Average (minutes):</label>
        <input type="number" id="long_window" value="30" step="1" min="1">
    </div>

    <div id="plot"></div>

    <button id="backButton" onclick="returnToFullPlot()">Back to Full Plot</button>

    <script>
        var data;
        var fullTraces = [];
        var groupMappings = {};
        var groupAverageTimes = {};
        var layout = {};
        var originalLayout;
        var currentGroupIndex = null;

        // Ensure all operations happen after the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', function () {
            loadData();
        });

        function loadData() {
            fetch('data/db_latest.json')
                .then(response => response.json())
                .then(jsonData => {
                    data = jsonData;
                    initializePlot();
                })
                .catch(error => console.error('Error loading data:', error));
        }

        function initializePlot() {
            updatePlot();

            // Attach event listeners for inputs
            document.getElementById('n_hours').addEventListener('input', updatePlot);
            document.getElementById('smooth_window').addEventListener('input', updatePlot);
            document.getElementById('prominence').addEventListener('input', updatePlot);
            document.getElementById('correlation_threshold').addEventListener('input', updatePlot);
            document.getElementById('correlation_window').addEventListener('input', updatePlot);
            document.getElementById('min_channels').addEventListener('input', updatePlot);
            document.getElementById('enable_filter').addEventListener('change', updatePlot);
            document.getElementById('short_window').addEventListener('input', updatePlot);
            document.getElementById('long_window').addEventListener('input', updatePlot);
        }

        function updatePlot() {
            var n_hours = parseFloat(document.getElementById('n_hours').value);
            var smooth_window = parseFloat(document.getElementById('smooth_window').value);
            var prominence = parseFloat(document.getElementById('prominence').value);
            var correlation_threshold = parseFloat(document.getElementById('correlation_threshold').value);
            var correlation_window = parseFloat(document.getElementById('correlation_window').value);
            var min_channels = parseInt(document.getElementById('min_channels').value);
            var enable_filter = document.getElementById('enable_filter').checked;
            var short_window = parseInt(document.getElementById('short_window').value);
            var long_window = parseInt(document.getElementById('long_window').value);

            var processedData = processData(
                data,
                n_hours,
                smooth_window,
                prominence,
                correlation_threshold,
                correlation_window,
                min_channels,
                enable_filter,
                short_window,
                long_window
            );

            plotData(processedData);
        }

        function plotData(processedData) {
            var signals = processedData.signals;
            var groups = processedData.groups;
            fullTraces = [];
            groupMappings = {};
            groupAverageTimes = {};

            var minY = Infinity;
            var maxY = -Infinity;

            for (var signalName in signals) {
                var signal = signals[signalName];
                var times = signal.times.map(t => new Date(t).toISOString());
                var values = signal.values;

                for (var i = 0; i < values.length; i++) {
                    if (values[i] < minY) minY = values[i];
                    if (values[i] > maxY) maxY = values[i];
                }

                fullTraces.push({
                    x: times,
                    y: values,
                    mode: 'lines',
                    name: signalName,
                    hoverinfo: 'name+x+y',
                    showlegend: true
                });
            }

            // Plot group peaks and vertical lines for average time of each group
            var colors = ['red', 'green', 'blue', 'orange', 'purple', 'cyan', 'magenta', 'yellow', 'black', 'grey'];
            for (var i = 0; i < groups.length; i++) {
                var group = groups[i];
                var color = colors[i % colors.length];
                groupMappings[i] = [];

                var timesInGroup = [];

                for (var signalName in group) {
                    var index = group[signalName];
                    var signal = signals[signalName];
                    var time = new Date(signal.times[index]).toISOString();
                    var value = signal.values[index];

                    timesInGroup.push(signal.times[index]);

                    fullTraces.push({
                        x: [time],
                        y: [value],
                        mode: 'markers',
                        marker: {
                            symbol: 'diamond',
                            size: 10,
                            color: color
                        },
                        name: 'Group ' + (i + 1),
                        legendgroup: 'Group ' + (i + 1),
                        showlegend: false,
                        hoverinfo: 'text+x+y',
                        text: 'Group ' + (i + 1),
                        customdata: { groupIndex: i },
                        meta: {
                            signalName: signalName,
                            traceType: 'groupPeak',
                            groupIndex: i
                        }
                    });
                }

                var avgTimeValue = timesInGroup.reduce(function(a, b) { return a + b; }, 0) / timesInGroup.length;
                var avgTime = new Date(avgTimeValue).toISOString();
                groupAverageTimes[i] = avgTime;

                // Add vertical line for group average time
                fullTraces.push({
                    x: [avgTime, avgTime],
                    y: [minY, maxY],
                    mode: 'lines',
                    line: {
                        color: 'red',
                        dash: 'dash',
                        width: 2
                    },
                    name: 'Group ' + (i + 1) + ' Avg Time',
                    showlegend: false,
                    hoverinfo: 'text',
                    text: 'Group ' + (i + 1) + ' Avg Time: ' + avgTime,
                    meta: {
                        groupIndex: i,
                        traceType: 'groupAvgTime'
                    }
                });
            }

            layout = {
                title: 'Signals',
                xaxis: {
                    title: 'Time (UTC)',
                    type: 'date',
                    tickformat: '%Y-%m-%d %H:%M UTC',
                    hoverformat: '%Y-%m-%d %H:%M UTC'
                },
                yaxis: { title: 'Smoothed Normalized Value' },
                hovermode: 'closest'
            };

            originalLayout = JSON.parse(JSON.stringify(layout));

            Plotly.newPlot('plot', fullTraces, layout, { responsive: true })
                .then(() => {
                    attachClickHandler(); // Attach click handler after rendering
                })
                .catch(error => {
                    console.error('Plot rendering error:', error);
                });
        }

        // Attach click handler to handle zooming into groups
        function attachClickHandler() {
            var plotDiv = document.getElementById('plot');
            if (!plotDiv) {
                console.error('Plot container not found.');
                return;
            }

            plotDiv.on('plotly_click', function(data) {
                if (data.points.length > 0) {
                    var point = data.points[0];
                    var pointMeta = point.fullData.meta;

                    if (pointMeta && (pointMeta.traceType === 'groupPeak' || pointMeta.traceType === 'groupAvgTime')) {
                        var groupIndex = parseInt(pointMeta.groupIndex);

                        if (currentGroupIndex === groupIndex) {
                            returnToFullPlot();
                        } else {
                            zoomToGroup(groupIndex);
                        }
                    }
                }
            });
        }

        // Zoom into the selected group
        function zoomToGroup(groupIndex) {
            var plotDiv = document.getElementById('plot');
            if (!plotDiv) {
                console.error('Plot container not found.');
                return;
            }

            var correlation_window = parseInt(document.getElementById('correlation_window').value);
            var groupTraceIndices = groupMappings[groupIndex];
            var groupSignals = {};
            var avgTime = groupAverageTimes[groupIndex];

            var update = { visible: [] };
            var zoomStartTime = new Date(new Date(avgTime).getTime() - 3 * correlation_window * 60 * 1000).toISOString();
            var zoomEndTime = new Date(new Date(avgTime).getTime() + 3 * correlation_window * 60 * 1000).toISOString();

            for (var i = 0; i < fullTraces.length; i++) {
                var traceMeta = fullTraces[i].meta;
                if (traceMeta) {
                    if (traceMeta.traceType === 'signalLine' && groupSignals[traceMeta.signalName]) {
                        update.visible.push(true);
                    } else if (traceMeta.traceType === 'groupPeak' && traceMeta.groupIndex === groupIndex) {
                        update.visible.push(true);
                    } else if (traceMeta.traceType === 'groupAvgTime' && traceMeta.groupIndex === groupIndex) {
                        update.visible.push(true);
                    } else {
                        update.visible.push(false);
                    }
                } else {
                    update.visible.push(false);
                }
            }

            layout.title = 'Signals - Group ' + (groupIndex + 1) + ' at ' + avgTime;
            layout.xaxis.range = [zoomStartTime, zoomEndTime];

            Plotly.relayout(plotDiv, layout)
                .then(() => {
                    return Plotly.restyle(plotDiv, update);
                })
                .catch(function(error) {
                    console.error('Error zooming to group:', error);
                });

            currentGroupIndex = groupIndex;
            document.getElementById('backButton').style.display = 'block';
        }

        // Return to the full plot
        function returnToFullPlot() {
            var plotDiv = document.getElementById('plot');
            if (!plotDiv) {
                console.error('Plot container not found.');
                return;
            }

            var update = { visible: [] };

            for (var i = 0; i < fullTraces.length; i++) {
                var traceMeta = fullTraces[i].meta;
                if (traceMeta) {
                    if (traceMeta.traceType === 'signalLine' || traceMeta.traceType === 'signalPeaks') {
                        update.visible.push(true);
                    } else if (traceMeta.traceType === 'groupAvgTime') {
                        update.visible.push(true);
                    } else if (traceMeta.traceType === 'groupPeak') {
                        update.visible.push(true);
                    } else {
                        update.visible.push(false);
                    }
                } else {
                    update.visible.push(false);
                }
            }

            layout.title = 'Signals';
            layout.xaxis.range = originalLayout.xaxis.range;

            Plotly.relayout(plotDiv, layout)
                .then(() => {
                    return Plotly.restyle(plotDiv, update);
                })
                .catch(function(error) {
                    console.error('Error returning to full plot:', error);
                });

            currentGroupIndex = null;
            document.getElementById('backButton').style.display = 'none';
        }
    </script>
</body>
</html>
