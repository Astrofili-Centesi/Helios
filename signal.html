<!DOCTYPE html>
<html>
<head>
    <title>Signal Analysis</title>
    <!-- Include Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        /* Set the plot div to have a minimum height of 50% of the viewport */
        #plot {
            min-height: 75vh;
        }
    </style>
</head>
<body>
    <h1>Signal Analysis</h1>
    <!-- Input parameters -->
    <div>
        <label for="n_hours">Number of hours:</label>
        <input type="number" id="n_hours" value="24" step="1" min="1">
        
        <label for="smooth_window">Smoothing window (minutes):</label>
        <input type="number" id="smooth_window" value="15" step="1" min="1">
        
        <label for="prominence">Prominence:</label>
        <input type="number" id="prominence" value="1" step="0.1" min="0">

        <label for="correlation_threshold">Correlation Threshold:</label>
        <input type="number" id="correlation_threshold" value="0.9" step="0.01" min="0" max="1">

        <label for="correlation_window">Correlation Window (minutes):</label>
        <input type="number" id="correlation_window" value="15" step="1" min="1">

        <label for="min_channels">Minimum Channels:</label>
        <input type="number" id="min_channels" value="1" step="1" min="1">
    </div>

    <!-- Plot area -->
    <div id="plot"></div>

    <!-- Script -->
    <script>
        var data; // Global variable to hold the data
        var fullTraces = []; // To store the full set of traces
        var currentGroupIndex = null; // To track the currently displayed group
        var groupMappings = {}; // Mapping from group index to trace indices
        var traceIndicesBySignal = {}; // Mapping from signalName to its trace indices
        var layout = {}; // Global layout variable

        // Function to load data from 'data/db_latest_day.json'
        function loadData() {
            fetch('data/db_latest_day.json')
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('Network response was not ok ' + response.statusText);
                    }
                    return response.json();
                })
                .then(function(jsonData) {
                    data = jsonData;
                    // After data is loaded, initialize the plot
                    initializePlot();
                })
                .catch(function(error) {
                    console.error('There has been a problem with your fetch operation:', error);
                });
        }

        // Moving average function
        function movingAverage(values, windowSize) {
            var result = [];
            var sum = 0;
            var count = 0;
            var window = [];

            for (var i = 0; i < values.length; i++) {
                window.push(values[i]);
                sum += values[i];
                count += 1;

                if (count > windowSize) {
                    sum -= window.shift();
                    count -= 1;
                }

                result.push(sum / count);
            }

            return result;
        }

        // Mean calculation function
        function mean(values) {
            var sum = values.reduce(function(a, b) { return a + b; }, 0);
            return sum / values.length;
        }

        // Standard deviation function
        function standardDeviation(values, meanValue) {
            var squareDiffs = values.map(function(value) {
                var diff = value - meanValue;
                return diff * diff;
            });
            var avgSquareDiff = mean(squareDiffs);
            return Math.sqrt(avgSquareDiff);
        }

        // Modified findPeaks function
        function findPeaks(values, prominence) {
            var peaks = [];
            for (var i = 1; i < values.length - 1; i++) {
                if (values[i] > values[i - 1] && values[i] > values[i + 1]) {
                    var leftMin = values[i - 1];
                    for (var j = i - 1; j >= 0; j--) {
                        if (values[j] <= leftMin) {
                            leftMin = values[j];
                        } else {
                            break;
                        }
                    }

                    var rightMin = values[i + 1];
                    for (var j = i + 1; j < values.length; j++) {
                        if (values[j] <= rightMin) {
                            rightMin = values[j];
                        } else {
                            break;
                        }
                    }

                    var peakProminence = values[i] - Math.max(leftMin, rightMin);
                    if (peakProminence >= prominence) {
                        peaks.push({
                            index: i,
                            value: values[i],
                            prominence: peakProminence
                        });
                    }
                }
            }
            return peaks;
        }

        // Cross-correlation function
        function computeCrossCorrelation(valuesA, valuesB, indexA, indexB, windowSize) {
            var startA = Math.max(0, indexA - Math.floor(windowSize / 2));
            var endA = Math.min(valuesA.length, indexA + Math.floor(windowSize / 2));

            var startB = Math.max(0, indexB - Math.floor(windowSize / 2));
            var endB = Math.min(valuesB.length, indexB + Math.floor(windowSize / 2));

            var windowA = valuesA.slice(startA, endA);
            var windowB = valuesB.slice(startB, endB);

            var length = Math.max(windowA.length, windowB.length);
            while (windowA.length < length) windowA.push(0);
            while (windowB.length < length) windowB.push(0);

            var meanA = mean(windowA);
            var meanB = mean(windowB);

            var numerator = 0;
            var denomA = 0;
            var denomB = 0;

            for (var i = 0; i < length; i++) {
                var diffA = windowA[i] - meanA;
                var diffB = windowB[i] - meanB;
                numerator += diffA * diffB;
                denomA += diffA * diffA;
                denomB += diffB * diffB;
            }

            var denominator = Math.sqrt(denomA * denomB);

            if (denominator == 0) {
                return 0;
            } else {
                return numerator / denominator;
            }
        }

        // Group peaks function
        function groupPeaks(processedSignals, correlation_threshold, correlation_window, min_channels) {
            var signalPeaks = {};

            for (var signalName in processedSignals) {
                var signal = processedSignals[signalName];
                var peaks = signal.peaks;

                signalPeaks[signalName] = peaks.map(function(peak) {
                    return peak.index;
                });
            }

            var groups = [];
            var signalsList = Object.keys(signalPeaks);
            var numSignals = signalsList.length;

            for (var i = 0; i < numSignals; i++) {
                var signalA = signalsList[i];
                var peaksA = signalPeaks[signalA];
                var signalDataA = processedSignals[signalA];

                for (var pa = 0; pa < peaksA.length; pa++) {
                    var indexA = peaksA[pa];
                    var group = {};
                    group[signalA] = indexA;

                    for (var j = i + 1; j < numSignals; j++) {
                        var signalB = signalsList[j];
                        var peaksB = signalPeaks[signalB];
                        var signalDataB = processedSignals[signalB];

                        for (var pb = 0; pb < peaksB.length; pb++) {
                            var indexB = peaksB[pb];

                            if (Math.abs(indexA - indexB) <= correlation_window) {
                                var corr = computeCrossCorrelation(signalDataA.smoothedValues, signalDataB.smoothedValues, indexA, indexB, correlation_window);

                                if (corr >= correlation_threshold) {
                                    group[signalB] = indexB;
                                }
                            }
                        }
                    }

                    if (Object.keys(group).length >= min_channels) {
                        groups.push(group);
                    }
                }
            }

            return groups;
        }

        // Linear interpolation function
        function linearInterpolate(x, x0, y0, x1, y1) {
            return y0 + ((y1 - y0) * (x - x0)) / (x1 - x0);
        }

        // Resample function
        function resampleData(times, values, resampleTimes) {
            var resampledValues = [];
            var index = 0;

            for (var i = 0; i < resampleTimes.length; i++) {
                var t = resampleTimes[i];

                // Find the interval [t0, t1] such that t0 <= t <= t1
                while (index < times.length - 1 && times[index + 1] < t) {
                    index++;
                }

                if (times[index] == t) {
                    resampledValues.push(values[index]);
                } else if (times[index] < t && times[index + 1] >= t) {
                    var interpolatedValue = linearInterpolate(
                        t,
                        times[index],
                        values[index],
                        times[index + 1],
                        values[index + 1]
                    );
                    resampledValues.push(interpolatedValue);
                } else {
                    // Extrapolate if outside the known times
                    resampledValues.push(values[index]);
                }
            }

            return resampledValues;
        }

        // Process data function
        function processData(data, n_hours, smooth_window, prominence, correlation_threshold, correlation_window, min_channels) {
            // Find the maximum timestamp in the data
            var maxTimestamp = 0;
            var minTimestamp = Infinity;
            for (var signalName in data) {
                var signalData = data[signalName];
                for (var timestamp in signalData) {
                    var time = parseInt(timestamp);
                    if (time > maxTimestamp) {
                        maxTimestamp = time;
                    }
                    if (time < minTimestamp) {
                        minTimestamp = time;
                    }
                }
            }

            var latestTime = maxTimestamp;
            var earliestTime = latestTime - n_hours * 3600 * 1000;

            // Generate common time axis at 1-minute intervals
            var resampleInterval = 60 * 1000; // 1 minute in milliseconds
            var resampleTimes = [];
            for (var t = earliestTime; t <= latestTime; t += resampleInterval) {
                resampleTimes.push(t);
            }

            var processedSignals = {};

            for (var signalName in data) {
                var signalData = data[signalName];
                var times = [];
                var values = [];

                for (var timestamp in signalData) {
                    var time = parseInt(timestamp);
                    var value = signalData[timestamp];

                    if (time >= earliestTime && time <= latestTime) {
                        times.push(time);
                        values.push(value);
                    }
                }

                // Sort times and values
                var combined = times.map(function(e, i) {
                    return { time: e, value: values[i] };
                });
                combined.sort(function(a, b) {
                    return a.time - b.time;
                });

                times = combined.map(function(e) { return e.time; });
                values = combined.map(function(e) { return e.value; });

                // Resample data at 1-minute intervals using linear interpolation
                var resampledValues = resampleData(times, values, resampleTimes);

                // Normalization
                var meanValue = mean(resampledValues);
                var stdValue = standardDeviation(resampledValues, meanValue);
                var normalizedValues = resampledValues.map(function(v) {
                    return ((v - meanValue) / stdValue) + (-50);
                });

                // Apply moving average to normalized values
                var smooth_window_samples = Math.max(Math.floor(smooth_window), 1); // Ensure at least window size of 1
                var smoothedValues = movingAverage(normalizedValues, smooth_window_samples);

                // Find peaks in smoothed normalized values
                var peaks = findPeaks(smoothedValues, prominence);

                processedSignals[signalName] = {
                    times: resampleTimes,
                    values: smoothedValues, // Use smoothed values for plotting
                    smoothedValues: smoothedValues,
                    peaks: peaks
                };
            }

            var groups = groupPeaks(processedSignals, correlation_threshold, correlation_window, min_channels);

            return {
                signals: processedSignals,
                groups: groups
            };
        }

        // Plotting function with interactivity
        function plotData(processedData) {
            var signals = processedData.signals;
            var groups = processedData.groups;
            fullTraces = []; // Reset fullTraces
            groupMappings = {}; // Reset group mappings
            traceIndicesBySignal = {}; // Reset signal trace indices

            var traceIndex = 0;

            for (var signalName in signals) {
                var signal = signals[signalName];

                var times = signal.times.map(function(time) {
                    return new Date(time);
                });
                var values = signal.values;

                // Signal line trace with metadata
                var trace = {
                    x: times,
                    y: values,
                    mode: 'lines',
                    name: signalName,
                    legendgroup: signalName,
                    hoverinfo: 'name+x+y',
                    showlegend: true,
                    meta: {
                        signalName: signalName,
                        traceType: 'signalLine'
                    }
                };

                fullTraces.push(trace);
                traceIndicesBySignal[signalName] = [traceIndex];
                traceIndex++;

                var peakTimes = signal.peaks.map(function(peak) {
                    return times[peak.index];
                });
                var peakValues = signal.peaks.map(function(peak) {
                    return values[peak.index];
                });

                // Signal peaks trace with metadata
                var peakTrace = {
                    x: peakTimes,
                    y: peakValues,
                    mode: 'markers',
                    marker: {
                        symbol: 'circle',
                        size: 6
                    },
                    name: signalName + ' Peaks',
                    legendgroup: signalName,
                    showlegend: false,
                    hoverinfo: 'name+x+y',
                    meta: {
                        signalName: signalName,
                        traceType: 'signalPeaks'
                    }
                };

                fullTraces.push(peakTrace);
                traceIndicesBySignal[signalName].push(traceIndex);
                traceIndex++;
            }

            // Plot grouped peaks
            var colors = ['red', 'green', 'blue', 'orange', 'purple', 'cyan', 'magenta', 'yellow', 'black', 'grey'];
            for (var i = 0; i < groups.length; i++) {
                var group = groups[i];
                var color = colors[i % colors.length];
                groupMappings[i] = []; // Initialize group mapping

                for (var signalName in group) {
                    var index = group[signalName];
                    var signal = signals[signalName];
                    var time = new Date(signal.times[index]);
                    var value = signal.values[index];

                    // Group peak trace with metadata
                    var groupTrace = {
                        x: [time],
                        y: [value],
                        mode: 'markers',
                        marker: {
                            symbol: 'diamond',
                            size: 10,
                            color: color
                        },
                        name: 'Group ' + (i + 1),
                        legendgroup: 'Group ' + (i + 1),
                        showlegend: false,
                        hoverinfo: 'text+x+y',
                        text: 'Group ' + (i + 1),
                        customdata: { groupIndex: i },
                        meta: {
                            signalName: signalName,
                            traceType: 'groupPeak',
                            groupIndex: i
                        }
                    };

                    fullTraces.push(groupTrace);
                    groupMappings[i].push(traceIndex);
                    traceIndex++;
                }
            }

            layout = {
                title: 'Signals',
                xaxis: {
                    title: 'Time'
                },
                yaxis: {
                    title: 'Smoothed Normalized Value'
                },
                hovermode: 'closest' // Set hovermode to 'closest' to reduce interference
            };

            Plotly.newPlot('plot', fullTraces, layout);

            // Reattach the click event handler after plot is created or updated
            attachClickHandler();
        }

        // Update plot function
        function updatePlot() {
            var n_hours = parseFloat(document.getElementById('n_hours').value);
            var smooth_window = parseFloat(document.getElementById('smooth_window').value);
            var prominence = parseFloat(document.getElementById('prominence').value);
            var correlation_threshold = parseFloat(document.getElementById('correlation_threshold').value);
            var correlation_window = parseFloat(document.getElementById('correlation_window').value);
            var min_channels = parseInt(document.getElementById('min_channels').value);

            currentGroupIndex = null; // Reset current group
            var processedData = processData(data, n_hours, smooth_window, prominence, correlation_threshold, correlation_window, min_channels);

            plotData(processedData);
        }

        // Function to attach the click event handler
        function attachClickHandler() {
            var plotDiv = document.getElementById('plot');

            plotDiv.on('plotly_click', function(data) {
                if (data.points.length > 0) {
                    var point = data.points[0];
                    var pointMeta = point.fullData.meta;

                    if (pointMeta && pointMeta.traceType === 'groupPeak') {
                        var groupIndex = parseInt(pointMeta.groupIndex);

                        if (currentGroupIndex === groupIndex) {
                            // If already filtered by this group, reset to full view
                            currentGroupIndex = null;
                            // Set all traces to visible
                            var update = {
                                visible: []
                            };
                            for (var i = 0; i < fullTraces.length; i++) {
                                update.visible.push(true);
                            }
                            Plotly.restyle('plot', update);
                        } else {
                            // Filter to show only signals in this group
                            currentGroupIndex = groupIndex;
                            var update = {
                                visible: []
                            };

                            // Get signals in the group
                            var groupTraceIndices = groupMappings[groupIndex];
                            var groupSignals = {};

                            for (var idx of groupTraceIndices) {
                                var traceMeta = fullTraces[idx].meta;
                                if (traceMeta && traceMeta.signalName) {
                                    groupSignals[traceMeta.signalName] = true;
                                }
                            }

                            for (var i = 0; i < fullTraces.length; i++) {
                                var traceMeta = fullTraces[i].meta;
                                if (traceMeta) {
                                    if (groupSignals[traceMeta.signalName]) {
                                        update.visible.push(true);
                                    } else {
                                        update.visible.push('legendonly');
                                    }
                                } else {
                                    update.visible.push(false);
                                }
                            }
                            Plotly.restyle('plot', update);
                        }
                    }
                }
            });
        }

        // Initialize plot function
        function initializePlot() {
            // Initial plot
            updatePlot();

            // Attach event listeners
            document.getElementById('n_hours').addEventListener('input', updatePlot);
            document.getElementById('smooth_window').addEventListener('input', updatePlot);
            document.getElementById('prominence').addEventListener('input', updatePlot);
            document.getElementById('correlation_threshold').addEventListener('input', updatePlot);
            document.getElementById('correlation_window').addEventListener('input', updatePlot);
            document.getElementById('min_channels').addEventListener('input', updatePlot);
        }

        // Load data and initialize
        loadData();
    </script>
</body>
</html>
